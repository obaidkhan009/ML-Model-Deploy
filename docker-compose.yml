# ==========================================
# Docker Compose — Local Development Stack
# ==========================================
# Runs BOTH the API and PostgreSQL together locally.
#
# Usage:
#   docker-compose up --build        → Start everything
#   docker-compose down              → Stop everything
#   docker-compose down -v           → Stop + delete database data
#   docker-compose logs -f api       → View API logs
#   docker-compose logs -f db        → View database logs
#
# After running, test with:
#   curl http://localhost:8000/health
#   curl -X POST http://localhost:8000/recommend \
#     -H "Content-Type: application/json" \
#     -d '{"food_name": "Butter Chicken", "num_recommendations": 5}'
# ==========================================

version: "3.8"

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:15-alpine
    container_name: food-recommender-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: food_recommender
    ports:
      - "5434:5432" # Exposed on 5434 to avoid conflict with local PostgreSQL (5432/5433)
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persist data across restarts
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Food Recommendation API ──
  api:
    build: .
    container_name: food-recommender-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/food_recommender
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy # Wait for PostgreSQL to be ready
    restart: unless-stopped

# Named volume — keeps database data even after docker-compose down
volumes:
  postgres_data:
